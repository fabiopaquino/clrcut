<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CLRCUT — Bulk Background Remover</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f03c;
    --accent-dim: #8aaa1f;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4c4c;
    --success: #3cf07a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 56px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 24px;
    height: 24px;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 span {
    color: var(--accent);
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .header-stats {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    line-height: 1.8;
  }

  .header-stats strong {
    color: var(--text);
    font-weight: 500;
  }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 64px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    margin-bottom: 40px;
  }

  .dropzone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,240,60,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: #141414;
  }

  .dropzone.drag-over {
    transform: scale(1.01);
  }

  .drop-icon {
    width: 56px;
    height: 56px;
    background: var(--surface2);
    border-radius: 14px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
  }

  .drop-icon svg { width: 28px; height: 28px; color: var(--accent); }

  .dropzone h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .dropzone p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: none;
    transition: all 0.15s ease;
  }

  .btn-accent {
    background: var(--accent);
    color: #0a0a0a;
  }

  .btn-accent:hover { background: #d8ff4a; transform: translateY(-1px); }
  .btn-accent:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid rgba(255,76,76,0.3);
  }
  .btn-danger:hover { background: rgba(255,76,76,0.1); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .queue-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .queue-label strong { color: var(--text); }

  /* Image grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: #3a3a3a; }
  .card.done { border-color: rgba(60, 240, 122, 0.3); }
  .card.error { border-color: rgba(255, 76, 76, 0.3); }
  .card.processing { border-color: rgba(200, 240, 60, 0.4); }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 1;
    background: repeating-conic-gradient(#1a1a1a 0% 25%, #141414 0% 50%) 0 0 / 16px 16px;
    overflow: hidden;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(4px);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(200,240,60,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .status-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .badge-done { background: rgba(60,240,122,0.15); color: var(--success); border: 1px solid rgba(60,240,122,0.3); }
  .badge-error { background: rgba(255,76,76,0.15); color: var(--danger); border: 1px solid rgba(255,76,76,0.3); }
  .badge-queued { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

  .card-info {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .card-name {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .card-action {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .card-action:hover { color: var(--accent); }
  .card-action.remove:hover { color: var(--danger); }

  /* Global progress bar */
  .progress-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: none;
  }

  .progress-bar-wrap.visible { display: block; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .progress-label {
    font-size: 14px;
    font-weight: 700;
  }

  .progress-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .progress-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Empty state */
  .empty { display: none; }

  /* Hidden input */
  #fileInput { display: none; }

  /* Loading model notice */
  .model-notice {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .app { padding: 32px 16px 60px; }
    h1 { font-size: 22px; }
    .dropzone { padding: 48px 20px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4l16 16M4 20l6-6m6-6l4-4"/>
          <rect x="3" y="3" width="18" height="18" rx="3"/>
        </svg>
      </div>
      <div>
        <h1>CLR<span>CUT</span></h1>
        <div class="tagline">BULK BACKGROUND REMOVER — 100% IN-BROWSER</div>
      </div>
    </div>
    <div class="header-stats" id="headerStats" style="display:none">
      <div><strong id="statTotal">0</strong> images loaded</div>
      <div><strong id="statDone">0</strong> completed</div>
    </div>
  </header>

  <div class="dropzone" id="dropzone">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <h2>Drop your images here</h2>
    <p>PNG · JPG · WEBP · up to 50 files at once</p>
    <button class="btn btn-accent" onclick="document.getElementById('fileInput').click()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Choose Files
    </button>
    <p style="margin-top:12px;margin-bottom:0">First run downloads the AI model (~14MB, cached after)</p>
  </div>

  <input type="file" id="fileInput" multiple accept="image/png,image/jpeg,image/webp" />

  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-header">
      <span class="progress-label" id="progressLabel">Processing...</span>
      <span class="progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="model-notice" id="modelNotice"></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <div class="toolbar-left">
      <span class="queue-label"><strong id="queueCount">0</strong> images in queue</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost" id="addMoreBtn" onclick="document.getElementById('fileInput').click()">
        + Add More
      </button>
      <button class="btn btn-accent" id="processBtn" onclick="processAll()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Remove Backgrounds
      </button>
      <button class="btn btn-ghost" id="downloadBtn" onclick="downloadAll()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download ZIP
      </button>
      <button class="btn btn-danger" id="clearBtn" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/browser/index.mjs';

const state = {
  files: [],        // { id, file, status: 'queued'|'processing'|'done'|'error', resultUrl, resultBlob }
  processing: false,
};

let nextId = 0;

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const grid = document.getElementById('grid');
const toolbar = document.getElementById('toolbar');
const processBtn = document.getElementById('processBtn');
const downloadBtn = document.getElementById('downloadBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressCount = document.getElementById('progressCount');
const progressLabel = document.getElementById('progressLabel');
const modelNotice = document.getElementById('modelNotice');

// Drag and drop
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files]);
});

fileInput.addEventListener('change', () => {
  addFiles([...fileInput.files]);
  fileInput.value = '';
});

function addFiles(files) {
  const images = files.filter(f => f.type.startsWith('image/'));
  images.forEach(file => {
    const id = nextId++;
    state.files.push({ id, file, status: 'queued', resultUrl: null, resultBlob: null });
    renderCard(id);
  });
  updateUI();
}

function renderCard(id) {
  const item = state.files.find(f => f.id === id);
  if (!item) return;

  const existing = document.getElementById(`card-${id}`);
  if (existing) { updateCard(id); return; }

  const url = URL.createObjectURL(item.file);
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${id}`;
  card.innerHTML = `
    <div class="card-img-wrap">
      <img id="img-${id}" src="${url}" alt="${item.file.name}" />
      <div class="card-overlay" id="overlay-${id}" style="display:none">
        <div class="spinner"></div>
        <div class="progress-text" id="ptext-${id}">Loading model...</div>
      </div>
    </div>
    <div class="card-info">
      <span class="card-name" title="${item.file.name}">${item.file.name}</span>
      <button class="card-action" id="dl-${id}" onclick="downloadSingle(${id})" title="Download" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="card-action remove" onclick="removeCard(${id})" title="Remove">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `;
  grid.appendChild(card);
}

function updateCard(id) {
  const item = state.files.find(f => f.id === id);
  if (!item) return;

  const card = document.getElementById(`card-${id}`);
  if (!card) return;

  card.className = `card ${item.status}`;

  const overlay = document.getElementById(`overlay-${id}`);
  const img = document.getElementById(`img-${id}`);
  const dlBtn = document.getElementById(`dl-${id}`);

  // Remove old badge
  const oldBadge = card.querySelector('.status-badge');
  if (oldBadge) oldBadge.remove();

  if (item.status === 'processing') {
    overlay.style.display = 'flex';
  } else {
    overlay.style.display = 'none';
  }

  if (item.status === 'done') {
    img.src = item.resultUrl;
    dlBtn.style.display = 'flex';
    const badge = document.createElement('div');
    badge.className = 'status-badge badge-done';
    badge.textContent = 'DONE';
    card.querySelector('.card-img-wrap').appendChild(badge);
  } else if (item.status === 'error') {
    dlBtn.style.display = 'none';
    const badge = document.createElement('div');
    badge.className = 'status-badge badge-error';
    badge.textContent = 'ERROR';
    card.querySelector('.card-img-wrap').appendChild(badge);
  } else if (item.status === 'queued') {
    dlBtn.style.display = 'none';
    const badge = document.createElement('div');
    badge.className = 'status-badge badge-queued';
    badge.textContent = 'QUEUED';
    card.querySelector('.card-img-wrap').appendChild(badge);
  }
}

function updateUI() {
  const total = state.files.length;
  const done = state.files.filter(f => f.status === 'done').length;
  const queued = state.files.filter(f => f.status === 'queued').length;

  toolbar.style.display = total > 0 ? 'flex' : 'none';
  dropzone.style.display = total > 0 ? 'none' : 'flex';

  document.getElementById('queueCount').textContent = total;
  document.getElementById('headerStats').style.display = total > 0 ? 'block' : 'none';
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;

  processBtn.disabled = state.processing || queued === 0;
  downloadBtn.disabled = done === 0;
}

window.removeCard = function(id) {
  const idx = state.files.findIndex(f => f.id === id);
  if (idx !== -1) state.files.splice(idx, 1);
  const card = document.getElementById(`card-${id}`);
  if (card) card.remove();
  updateUI();
  if (state.files.length === 0) dropzone.style.display = '';
};

window.clearAll = function() {
  state.files = [];
  grid.innerHTML = '';
  progressWrap.classList.remove('visible');
  updateUI();
  dropzone.style.display = '';
  toolbar.style.display = 'none';
};

window.downloadSingle = function(id) {
  const item = state.files.find(f => f.id === id);
  if (!item || !item.resultBlob) return;
  const a = document.createElement('a');
  a.href = item.resultUrl;
  const name = item.file.name.replace(/\.[^.]+$/, '') + '_no-bg.png';
  a.download = name;
  a.click();
};

window.downloadAll = async function() {
  const done = state.files.filter(f => f.status === 'done');
  if (done.length === 0) return;
  const zip = new JSZip();
  done.forEach(item => {
    const name = item.file.name.replace(/\.[^.]+$/, '') + '_no-bg.png';
    zip.file(name, item.resultBlob);
  });
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'clrcut-export.zip';
  a.click();
  URL.revokeObjectURL(url);
};

window.processAll = async function() {
  if (state.processing) return;
  state.processing = true;

  const queued = state.files.filter(f => f.status === 'queued');
  const total = queued.length;
  let completed = 0;

  progressWrap.classList.add('visible');
  progressLabel.textContent = 'Removing backgrounds...';
  progressCount.textContent = `0 / ${total}`;
  progressFill.style.width = '0%';
  modelNotice.textContent = 'First image may take 10–20s to load the AI model. Subsequent images are faster.';

  processBtn.disabled = true;

  for (const item of queued) {
    item.status = 'processing';
    updateCard(item.id);
    updateUI();

    const ptextEl = document.getElementById(`ptext-${item.id}`);

    try {
      const blob = await removeBackground(item.file, {
        model: 'medium',
        output: { format: 'image/png', quality: 1 },
        progress: (key, current, total) => {
          if (ptextEl) {
            if (key.includes('fetch')) ptextEl.textContent = 'Loading model...';
            else ptextEl.textContent = 'Processing...';
          }
        }
      });

      item.resultBlob = blob;
      item.resultUrl = URL.createObjectURL(blob);
      item.status = 'done';
      modelNotice.textContent = '';
    } catch (err) {
      console.error(err);
      item.status = 'error';
    }

    updateCard(item.id);
    completed++;
    progressCount.textContent = `${completed} / ${total}`;
    progressFill.style.width = `${(completed / total) * 100}%`;
    updateUI();
  }

  progressLabel.textContent = `Done — ${completed} image${completed !== 1 ? 's' : ''} processed`;
  state.processing = false;
  updateUI();
};
</script>
</body>
</html>
